<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>食堂菜单 · 意见反馈</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", sans-serif;
}
body {
  background: #f7f7f7;
  padding: 15px;
}
header {
  text-align: center;
  margin-bottom: 20px;
}
h1 {
  color: #d32f2f;
  font-size: 22px;
}
.card {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.card-title {
  font-size: 17px;
  color: #333;
  margin-bottom: 12px;
  border-left: 4px solid #d32f2f;
  padding-left: 8px;
}
.dish-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.dish-item {
  background: #fafafa;
  padding: 10px;
  text-align: center;
  border-radius: 8px;
  font-size: 14px;
}
input,textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 15px;
  margin-bottom: 10px;
}
textarea {
  min-height: 90px;
  resize: none;
}
.btn {
  width: 100%;
  background: #d32f2f;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 12px;
  font-size: 16px;
  cursor: pointer;
}
.btn:active {
  background: #b71c1c;
}
.tip {
  color: #4caf50;
  text-align: center;
  font-size: 14px;
  display: none;
  margin: 8px 0;
}
.feedback-item {
  background: #fafafa;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 10px;
}
.feedback-name {
  font-weight: bold;
  color: #d32f2f;
  margin-bottom: 4px;
}
.feedback-time {
  font-size: 12px;
  color: #888;
  margin-bottom: 6px;
}
.collapse-btn {
  width: 100%;
  background: #eee;
  color: #333;
  border: none;
  border-radius: 8px;
  padding: 10px;
  font-size: 15px;
  margin-top: 5px;
  cursor: pointer;
}
.collapse-content {
  display: none;
  margin-top: 10px;
}
.loading {
  text-align: center;
  color: #666;
  padding: 10px;
}
</style>
</head>
<body>

<header>
  <h1>🍚 食堂菜单 & 意见反馈</h1>
</header>

<!-- 菜单区域 -->
<div class="card">
  <div class="card-title">今日菜单</div>
  <div class="loading" id="menuLoading">加载中...</div>
  <div class="dish-grid" id="dishList"></div>

  <button class="collapse-btn" id="toggleMenuEdit">修改菜单（管理员）</button>
  <div class="collapse-content" id="menuEditArea">
    <textarea id="menuInput" placeholder="菜品用英文逗号分隔"></textarea>
    <button class="btn" id="saveMenuBtn">保存菜单</button>
    <div class="tip" id="menuTip">菜单更新成功</div>
  </div>
</div>

<!-- 提交反馈 -->
<div class="card">
  <div class="card-title">💬 提交意见</div>
  <input type="text" id="userName" placeholder="称呼（可匿名）">
  <textarea id="userContent" placeholder="请输入意见建议"></textarea>
  <button class="btn" id="submitBtn">提交反馈</button>
  <div class="tip" id="submitTip">反馈提交成功</div>
</div>

<!-- 查看反馈 -->
<div class="card">
  <div class="card-title">📋 全部反馈</div>
  <button class="collapse-btn" id="toggleFeedback">展开查看反馈</button>
  <div class="collapse-content" id="feedbackArea"></div>
</div>

<script>
// 默认初始菜品（保证页面绝不空白）
const DEFAULT_MENU = "炖牛腩,鸡腿,排骨,炒白菜,空心菜,豆芽,番茄炒蛋,蒸蛋,玉米碎肉";
let globalMenu = DEFAULT_MENU;
let globalFeedback = [];

// 页面元素
const dishList = document.getElementById('dishList');
const menuLoading = document.getElementById('menuLoading');
const menuInput = document.getElementById('menuInput');
const toggleMenuEdit = document.getElementById('toggleMenuEdit');
const menuEditArea = document.getElementById('menuEditArea');
const saveMenuBtn = document.getElementById('saveMenuBtn');
const menuTip = document.getElementById('menuTip');

const userName = document.getElementById('userName');
const userContent = document.getElementById('userContent');
const submitBtn = document.getElementById('submitBtn');
const submitTip = document.getElementById('submitTip');

const toggleFeedback = document.getElementById('toggleFeedback');
const feedbackArea = document.getElementById('feedbackArea');

// 渲染菜单
function renderMenu() {
  menuLoading.style.display = 'none';
  dishList.innerHTML = '';
  const dishArr = globalMenu.split(',');
  dishArr.forEach(dish => {
    const div = document.createElement('div');
    div.className = 'dish-item';
    div.innerText = dish.trim();
    dishList.appendChild(div);
  });
  menuInput.value = globalMenu;
}

// 渲染反馈列表
function renderFeedback() {
  feedbackArea.innerHTML = '';
  if (globalFeedback.length === 0) {
    feedbackArea.innerHTML = '<p style="text-align:center;color:#888;">暂无反馈</p>';
    return;
  }
  // 最新数据在顶部
  globalFeedback.slice().reverse().forEach(item => {
    const div = document.createElement('div');
    div.className = 'feedback-item';
    div.innerHTML = `
      <div class="feedback-name">${item.name || '匿名'}</div>
      <div class="feedback-time">${item.time}</div>
      <div>${item.content}</div>
    `;
    feedbackArea.appendChild(div);
  });
}

// 折叠/展开 菜单编辑
toggleMenuEdit.addEventListener('click', () => {
  menuEditArea.style.display = menuEditArea.style.display === 'block' ? 'none' : 'block';
});

// 保存菜单
saveMenuBtn.addEventListener('click', () => {
  const newMenu = menuInput.value.trim();
  if (!newMenu) {
    alert('菜品内容不能为空！');
    return;
  }
  globalMenu = newMenu;
  renderMenu();
  menuTip.style.display = 'block';
  setTimeout(() => menuTip.style.display = 'none', 1500);
});

// 提交反馈
submitBtn.addEventListener('click', () => {
  const name = userName.value.trim();
  const content = userContent.value.trim();
  if (!content) {
    alert('请填写反馈内容！');
    return;
  }
  const time = new Date().toLocaleString();
  globalFeedback.push({ name, content, time });
  renderFeedback();
  userName.value = '';
  userContent.value = '';
  submitTip.style.display = 'block';
  setTimeout(() => submitTip.style.display = 'none', 1500);
});

// 折叠/展开 反馈列表
toggleFeedback.addEventListener('click', () => {
  feedbackArea.style.display = feedbackArea.style.display === 'block' ? 'none' : 'block';
});

// 页面初始化（保底渲染，绝不空白）
window.onload = function() {
  renderMenu();
  renderFeedback();
};
</script>

</body>
</html>
