<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- 关键：移动端适配 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>食堂菜单 · 意见反馈</title>
<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Microsoft YaHei",sans-serif;
}
body {
  background:#f7f7f7;
  padding:15px;
}
header {
  text-align:center;
  margin-bottom:20px;
}
h1 {
  color:#d32f2f;
  font-size:22px;
}
.card {
  background:#fff;
  border-radius:12px;
  padding:16px;
  margin-bottom:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
.card-title {
  font-size:17px;
  color:#333;
  margin-bottom:12px;
  border-left:4px solid #d32f2f;
  padding-left:8px;
}
/* 菜品网格：手机两列 */
.dish-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.dish-item {
  background:#fafafa;
  padding:10px;
  text-align:center;
  border-radius:8px;
  font-size:14px;
}
input,textarea {
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:15px;
  margin-bottom:10px;
}
textarea {
  min-height:90px;
  resize:none;
}
.btn {
  width:100%;
  background:#d32f2f;
  color:#fff;
  border:none;
  border-radius:8px;
  padding:12px;
  font-size:16px;
}
.btn:active {
  background:#b71c1c;
}
.tip {
  color:#4caf50;
  text-align:center;
  font-size:14px;
  display:none;
  margin:8px 0;
}
.feedback-item {
  background:#fafafa;
  padding:12px;
  border-radius:8px;
  margin-bottom:10px;
}
.feedback-name {
  font-weight:bold;
  color:#d32f2f;
  margin-bottom:4px;
}
.feedback-time {
  font-size:12px;
  color:#888;
  margin-bottom:6px;
}
/* 折叠面板 */
.collapse-btn {
  width:100%;
  background:#eee;
  color:#333;
  border:none;
  border-radius:8px;
  padding:10px;
  font-size:15px;
  margin-top:5px;
}
.collapse-content {
  display:none;
  margin-top:10px;
}
</style>
</head>
<body>

<header>
  <h1>🍚 食堂菜单 & 意见反馈</h1>
</header>

<!-- 今日菜单 -->
<div class="card">
  <div class="card-title">今日菜单</div>
  <div class="dish-grid" id="dishList"></div>
  <button class="collapse-btn" id="toggleMenuEdit">修改菜单（管理员）</button>
  <div class="collapse-content" id="menuEditArea">
    <textarea id="menuInput" placeholder="用英文逗号分隔菜品，例如：炖牛腩,鸡腿"></textarea>
    <button class="btn" id="saveMenuBtn">保存菜单</button>
    <div class="tip" id="menuTip">菜单已更新</div>
  </div>
</div>

<!-- 提交意见 -->
<div class="card">
  <div class="card-title">💬 提交意见</div>
  <input type="text" id="userName" placeholder="你的称呼（选填可匿名）">
  <textarea id="userContent" placeholder="请输入意见或建议..."></textarea>
  <button class="btn" id="submitBtn">提交反馈</button>
  <div class="tip" id="submitTip">反馈提交成功</div>
</div>

<!-- 查看反馈 -->
<div class="card">
  <div class="card-title">📋 全部反馈</div>
  <button class="collapse-btn" id="toggleFeedback">展开查看反馈</button>
  <div class="collapse-content" id="feedbackArea"></div>
</div>

<script>
// 本地存储key
const MENU_KEY = "canteen_menu";
const FEED_KEY = "canteen_feedback";
const defaultMenu = "炖牛腩,鸡腿,排骨,炒白菜,空心菜,豆芽,番茄炒蛋,蒸蛋,玉米碎肉";

// 初始化
if (!localStorage.getItem(MENU_KEY)) localStorage.setItem(MENU_KEY, defaultMenu);
if (!localStorage.getItem(FEED_KEY)) localStorage.setItem(FEED_KEY, JSON.stringify([]));

// 渲染菜单
function renderMenu(){
  let dishes = localStorage.getItem(MENU_KEY).split(",");
  dishList.innerHTML = "";
  dishes.forEach(d=>{
    let div = document.createElement("div");
    div.className = "dish-item";
    div.innerText = d.trim();
    dishList.appendChild(div);
  });
  menuInput.value = localStorage.getItem(MENU_KEY);
}

// 渲染反馈
function renderFeedback(){
  let list = JSON.parse(localStorage.getItem(FEED_KEY));
  feedbackArea.innerHTML = "";
  if (list.length===0) {
    feedbackArea.innerHTML = "<p style='text-align:center;color:#888;'>暂无反馈</p>";
    return;
  }
  // 最新在前
  list.reverse().forEach(item=>{
    let div = document.createElement("div");
    div.className = "feedback-item";
    div.innerHTML = `
      <div class="feedback-name">${item.name||"匿名"}</div>
      <div class="feedback-time">${item.time}</div>
      <div>${item.content}</div>
    `;
    feedbackArea.appendChild(div);
  });
}

// 折叠：修改菜单
toggleMenuEdit.addEventListener("click",()=>{
  menuEditArea.style.display = menuEditArea.style.display === "block" ? "none" : "block";
});

// 保存菜单
saveMenuBtn.addEventListener("click",()=>{
  let val = menuInput.value.trim();
  if (!val) return alert("菜品不能为空");
  localStorage.setItem(MENU_KEY, val);
  renderMenu();
  menuTip.style.display = "block";
  setTimeout(()=>menuTip.style.display="none",1500);
});

// 提交反馈
submitBtn.addEventListener("click",()=>{
  let name = userName.value.trim();
  let content = userContent.value.trim();
  if (!content) return alert("请填写反馈内容");
  let time = new Date().toLocaleString();
  let list = JSON.parse(localStorage.getItem(FEED_KEY));
  list.push({name,content,time});
  localStorage.setItem(FEED_KEY, JSON.stringify(list));
  renderFeedback();
  userName.value = "";
  userContent.value = "";
  submitTip.style.display = "block";
  setTimeout(()=>submitTip.style.display="none",1500);
});

// 折叠：查看反馈
toggleFeedback.addEventListener("click",()=>{
  feedbackArea.style.display = feedbackArea.style.display === "block" ? "none" : "block";
});

// 初始渲染
renderMenu();
renderFeedback();
</script>

</body>
</html>
